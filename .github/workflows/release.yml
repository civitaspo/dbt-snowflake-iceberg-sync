name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install unit test packages
        run: uv run dbt deps --project-dir unit_tests --profiles-dir unit_tests

      - name: Run unit tests
        run: uv run dbt run-operation run_unit_tests --project-dir unit_tests --profiles-dir unit_tests

      - name: Install integration test packages
        run: uv run dbt deps --project-dir integration_tests --profiles-dir integration_tests

      - name: Compile integration project
        run: uv run dbt compile --project-dir integration_tests --profiles-dir integration_tests

      - name: Install dbt Fusion
        run: |
          mkdir -p "$RUNNER_TEMP/dbt-fusion-bin"
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh \
            | sh -s -- --to "$RUNNER_TEMP/dbt-fusion-bin" --update
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" --version

      - name: Install unit test packages with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" deps --project-dir unit_tests --profiles-dir unit_tests

      - name: Run unit tests with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" run-operation run_unit_tests --project-dir unit_tests --profiles-dir unit_tests

      - name: Install integration test packages with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" deps --project-dir integration_tests --profiles-dir integration_tests

      - name: Parse integration project with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" parse --project-dir integration_tests --profiles-dir integration_tests

      - name: Compile integration project with Fusion
        run: |
          "$RUNNER_TEMP/dbt-fusion-bin/dbt" compile --project-dir integration_tests --profiles-dir integration_tests

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
