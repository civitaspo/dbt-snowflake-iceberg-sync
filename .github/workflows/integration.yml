name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref, branch, tag, or SHA to test"
        required: true
        type: string
      python-version:
        description: "Python version"
        required: true
        type: choice
        options:
          - "3.13"
          - "3.11"

permissions: {}

concurrency:
  group: integration-${{ github.workflow }}-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    environment:
      name: integration-tests
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: "2026.5.15"
          install_args: "--locked"
          cache: false

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run integration tests
        env:
          DBT_SNOWFLAKE_ICEBERG_SYNC_RUN_INTEGRATION: "1"
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_AUTHENTICATOR: ${{ secrets.SNOWFLAKE_AUTHENTICATOR }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_EXPORT_STAGE: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_EXPORT_STAGE }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_VOLUME: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_VOLUME }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_DATABASE }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_SCHEMA: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_SCHEMA }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_SECRET_FQDN: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_SECRET_FQDN }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_SECRET_ALIAS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_SECRET_ALIAS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_ACCESS_INTEGRATION: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_ACCESS_INTEGRATION }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_PROJECT_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_PROJECT_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_LOCATION: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_LOCATION }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_DATASET_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_DATASET_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TABLE_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TABLE_EXPECTED_ROWS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_EXPECTED_ROWS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITIONED_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITIONED_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_DECORATOR: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_DECORATOR }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_EXPECTED_ROWS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITIONED_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITIONED_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_DECORATOR: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_DECORATOR }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_EXPECTED_ROWS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_STAGING_DATASET_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_STAGING_DATASET_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_SQL: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_SQL }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_PREDICATE: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_PREDICATE }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_EXPECTED_ROWS }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_TABLE_ID: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_TABLE_ID }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_EXPORT_PREDICATE_TYPE: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_EXPORT_PREDICATE_TYPE }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_FULL_REFRESH_PREDICATES: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_FULL_REFRESH_PREDICATES }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_PREDICATES: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_PREDICATES }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_PREDICATE: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_PREDICATE }}
          DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_EXPECTED_ROWS: ${{ secrets.DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_EXPECTED_ROWS }}
        run: |
          required_env=(
            SNOWFLAKE_ACCOUNT
            SNOWFLAKE_USER
            SNOWFLAKE_AUTHENTICATOR
            SNOWFLAKE_DATABASE
            SNOWFLAKE_SCHEMA
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_EXPORT_STAGE
            DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_VOLUME
            DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_DATABASE
            DBT_SNOWFLAKE_ICEBERG_SYNC_PROCEDURE_SCHEMA
            DBT_SNOWFLAKE_ICEBERG_SYNC_SECRET_FQDN
            DBT_SNOWFLAKE_ICEBERG_SYNC_EXTERNAL_ACCESS_INTEGRATION
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_PROJECT_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_LOCATION
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_DATASET_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TABLE_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_TABLE_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_NON_PARTITIONED_EXPECTED_ROWS
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITIONED_TABLE_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_DECORATOR
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_TIME_PARTITION_EXPECTED_ROWS
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITIONED_TABLE_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_DECORATOR
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_RANGE_PARTITION_EXPECTED_ROWS
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_STAGING_DATASET_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_SQL
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_PREDICATE
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_SELECT_EXPECTED_ROWS
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_TABLE_ID
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_FULL_REFRESH_PREDICATES
            DBT_SNOWFLAKE_ICEBERG_SYNC_BIGQUERY_INCREMENTAL_PREDICATES
            DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_PREDICATE
            DBT_SNOWFLAKE_ICEBERG_SYNC_INCREMENTAL_EXPECTED_ROWS
          )

          missing=false
          for name in "${required_env[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for integration tests."
              missing=true
            fi
          done

          if [ -z "${SNOWFLAKE_PASSWORD:-}" ] && [ -z "${SNOWFLAKE_PRIVATE_KEY:-}" ]; then
            echo "::notice::No password or private key secret is set; relying on the configured Snowflake authenticator."
          fi

          if [ "$missing" = true ]; then
            exit 1
          fi

          if [ -n "${SNOWFLAKE_PRIVATE_KEY:-}" ]; then
            umask 077
            printf '%s' "$SNOWFLAKE_PRIVATE_KEY" > "$RUNNER_TEMP/snowflake_private_key.p8"
            export SNOWFLAKE_PRIVATE_KEY_PATH="$RUNNER_TEMP/snowflake_private_key.p8"
          fi

          uv run pytest -m integration tests/integration
